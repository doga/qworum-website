text:
  mission:
    oneliner: Qworum is the Web for applications
    usp:
    - More capable and more secure Web applications.
    - Distributed Web applications — Integrated user experiences over multiple internal/SaaS webapps. Devops involving multiple teams/orgs.
    - <a target='_blank' href='https://www.linkedin.com/posts/dogaarmangil_api-cybersecurity-ipaas-activity-7447671635412967425-cW2f?utm_source=share&utm_medium=member_desktop&rcm=ACoAAADK4nUBYoFztNSBgrl2-Rc5wjjYssZ-iWQ'>A step up in integration security</a>.
    - >
      <a target='_blank' href='{{company.achievements.medal}}'>Award-winning</a>
      and 
      <a target='_blank' href='{{company.achievements.patent}}'>patent-based</a>. 
    - What is the current Web? <a target='_blank' href='https://www.linkedin.com/feed/update/urn:li:activity:7464968807682363393/'>A content platform with limited application support</a>.

    valueProposition:
    # - title: The new essential enterprise infrastructure
    #   description: >
    #     <a target='_blank' href='https://www.linkedin.com/posts/dogaarmangil_report-state-of-saas-integrations-2024-activity-7273076432229044224-i2wr'>A recent survey
    #     shows that application integration is <em>key</em> or <em>very important</em>
    #     for 84% of SaaS customers</a>. 
    #     Yet the REST protocol used by most SaaS is 25 years old at this point.
    #     Qworum's interactive and composable APIs are a significant technological breakthrough in application integration.
    - title: 🧑‍💻 Modular and distributed application frontends
      description: Qworum APIs are a new way of structuring Web application frontends that goes much beyond what frontend frameworks such as ReactJS can do, and complements them.
    - title: 🛡 Secure integrations
      description: >
        Qworum is a breakthrough in integration security. Qworum APIs are
        <a target='_blank' href='https://www.linkedin.com/posts/dogaarmangil_api-web-activity-7287639516608098306-YyMF?utm_source=share&utm_medium=member_desktop'>
        a more secure alternative to OAuth+REST</a>. In order to safeguard user data, we recommend that SaaS vendors and other companies put in place a Qworum-first integration strategy for their internet applications and internal applications. With Qworum, end-users can be sure that each and every API call is happening with their full consent.
    - title: 🧑‍💻 Interactive Web APIs
      description: >
        Qworum APIs break new ground with their support for interactivity. Qworum API endpoints can interact with end-users through regular Web pages during a call. Qworum APIs are ideal for user-facing processes, which become much easier to program, because the API brings much of the application user interface with it, enabling UI reuse across applications, across the Web.
    - title: Composable Web APIs
      description: >
        Qworum has defined the only Web API technology that is composable. A Qworum API can call another Qworum API without the user authentication and network timeout problems that are unsolved for the other Web API protocols.
    - title: 🤖 AI-ready
      description: >
        AI has made RDF an essential data technology to use in production, as RDF is key for making structured data consumable by LLMs. Standards exist to support structured-data-to-RDF transformations, and <a target='_blank' href='https://www.linkedin.com/feed/update/urn:li:activity:7468995273898299392/'>Qworum provides the missing "last-mile" annotation solution to translate RDF into human prose which is consumable by LLMs</a> as well as by humans.
    - title: 💭 Fit for knowledge applications
      description: >
        Qworum supports RDF natively, in addition to JSON. RDF has found widespread use within knowledge-based industries such as pharma, health and biology, cosmetics, food, e-commerce, finance and banking, and the public sector.
    - title: Easy integrations
      description: >
        Qworum-based integrations are simple to program. Applications can call the Qworum APIs of other applications without any setup phase whatsoever. No need to obtain API keys. No need to implement an OAuth dance to link up the end-user's accounts on both applications. Integrations are about as easy as adding a hyperlink to a website. Except that the link is actually a script.
    - title: Easy to get started
      description: Use Qworum in production on a piecemeal basis. Add a Qworum API to existing applications just for integrations. Then you can transition your applications to Qworum at your own pace. For greenfield projects, make you application a Qworum application from the start; this will obviate the need for a separate Qworum API.
    # - title: New business opportunity in the B2B space
    #   description: Qworum APIs can be built by third parties on top of public SaaS APIs, and API subscriptions can be sold to SaaS customers and partners.
#    - title: ⎔ An upgrade to the Web platform for application use cases
#      description: >
#        Today's Web is still fundamentally a content platform, despite JavaScript and the ability to sign into websites. Qworum transforms the Web from a platform for personalisable and dynamic content into a proper application platform. To do that, Qworum defines groundbreaking new platform features such as a new browser runtime that complements JavaScript, and a new script-based linking mechanism that addresses application use cases.

