text:
  mission:
    oneliner: Qworum is the Web for applications
    usp:
    - Distributed web applications. Integrated user experiences over multiple internal or internet websites. Devops involving multiple teams and/or organisations.
    - <a target='_blank' href='https://www.linkedin.com/posts/dogaarmangil_api-cybersecurity-ipaas-activity-7447671635412967425-cW2f?utm_source=share&utm_medium=member_desktop&rcm=ACoAAADK4nUBYoFztNSBgrl2-Rc5wjjYssZ-iWQ'>A step up in integration security</a> as compared with the current Web.
    - Suitable for both B2B and B2C applications.
    - >
      <a target='_blank' href='{{company.achievements.medal}}'>Award-winning</a>
      and 
      <a target='_blank' href='{{company.achievements.patent}}'>patent-based</a>. 
    - What is the current Web? <a target='_blank' href='https://www.linkedin.com/feed/update/urn:li:activity:7464968807682363393/'>A content platform with limited application support</a>.

    valueProposition:
    - title: The new essential enterprise infrastructure
      description: >
        <a target='_blank' href='https://www.linkedin.com/posts/dogaarmangil_report-state-of-saas-integrations-2024-activity-7273076432229044224-i2wr'>A recent survey
        shows that application integration is <em>key</em> or <em>very important</em>
        for 84% of SaaS customers</a>. 
        Yet the REST protocol used by most SaaS is 25 years old at this point.
        Qworum's interactive and composable APIs are a significant technological breakthrough in application integration.
    - title: A secure web API technology
      description: >
        Qworum is a breakthrough in web API security. Qworum APIs are
        <a target='_blank' href='https://www.linkedin.com/posts/dogaarmangil_api-web-activity-7287639516608098306-YyMF?utm_source=share&utm_medium=member_desktop'>
        a more secure alternative to OAuth+REST for many use cases</a>. Indeed,
        in contrast to REST, the end-user stays in the loop during API calls, 
        and as a result applications cannot make API calls without the user's consent.
    - title: AI-ready and fit for knowledge applications
      description: >
        RDF is natively supported as an alternative to JSON for representing data. 
        RDF brings semantic data capabilities which are essential for AI. RDF is also widely used in many knowledge-based industries
        such as pharma, health and biology, cosmetics, food, e-commerce, finance and banking, and the public sector.
    # - title: New business opportunity in the B2B space
    #   description: Qworum APIs can be built by third parties on top of public SaaS APIs, and API subscriptions can be sold to SaaS customers and partners.
    - title: An upgrade to the Web platform for application use cases
      description: >
        Today's Web is still fundamentally a content platform, despite JavaScript. 
        Qworum provides new browser features such as a script-based linking mechanism and a new in-browser session storage to enable advanced web applications that go much beyond what today's webapps and web APIs can do.
    

  callToAction: Request a demo

  downloads:
    title: Free web browser extension
    desktop: 'Qworum on desktop:'
    mobile: 'Qworum on mobile:'
    description: >
      Your data is safe: the Qworum extension never sends data to the network. See our <a target="_blank" href="/docs/legal/privacy-policy/">privacy policy</a>. Note that Qworum-based applications have their own distinct privacy policies.

  video:
    title: 3-minute presentation
    description:
    - "Timeline:"
    - 0:00 Business use case.
    - 0:18 Technology.
    - 0:38 Demo — Application integration across 3 websites (project management application calls HCM application for adding members to a project, and both services use the same user authentication service) .
    - 2:31 The 3 Webs — Qworum as the 3rd Web variant.
#    - This is a 30-second demo showing how Qworum APIs can advantageously replace REST and GraphQL APIs. Here an e-commerce application calls the Qworum API of a remote shopping cart service.
#    - Note that the e-commerce application is implemented as a Qworum API as well. Non-Qworum web applications can also call Qworum APIs, although this demo does not show it.
#    - Also note how the end-user interacts with the shopping cart service directly, without going through the e-commerce application. This feature sets Qworum apart from REST, GraphQL and all other API types. Notably, this makes Qworum APIs the only ones able to support secure user authentication across all services, even for those involved in deep service dependency graphs.

  liveDemo:
    title: Live demo
    description: |
      <a target="_blank" href="{{company.demo.pm.url}}">Launch the live demo here</a>.
